<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script>
      (() => {
        const extensionRuntime =
          (typeof globalThis.browser !== 'undefined' && globalThis.browser?.runtime?.id) ||
          (typeof globalThis.chrome !== 'undefined' && globalThis.chrome?.runtime?.id);
        document.documentElement.dataset.runtime = extensionRuntime ? 'extension' : 'web';
      })();
    </script>
    <style>
      html[data-runtime='extension'],
      html[data-runtime='extension'] body,
      html[data-runtime='extension'] #app {
        width: 368px;
        min-width: 368px;
      }
    </style>
    <title>QR Code Tool</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" sizes="16x16 32x32 48x48" />
    <link rel="apple-touch-icon" href="/icon/128.png" />
    <meta name="theme-color" content="#0b5d4c" />
    <meta name="manifest.type" content="browser_action" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="./main.ts"></script>
  </body>
</html>
